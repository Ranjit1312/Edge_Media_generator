# Self-Hosted Langfuse — Developer Mode Only
# Start with: docker compose -f docker-compose.langfuse.yml up -d
# Access at: http://localhost:3000
#
# Set these env vars for the animation generator:
#   DEV_MODE=true
#   LANGFUSE_PUBLIC_KEY=<your-key>
#   LANGFUSE_SECRET_KEY=<your-secret>
#   LANGFUSE_HOST=http://localhost:3000

version: "3.8"

services:
  langfuse-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev_password
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_dev_password@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-production
      SALT: dev-salt-do-not-use-in-production
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

volumes:
  langfuse_pgdata:
